<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nike Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">

    <!-- HEADER -->
    <header class="header">
      <div class="header-inner">
        <div class="header-left">
          <img src="images/logo.png" alt="Nike Logo" class="logo" />
        </div>

        <nav class="menu">
          <a href="#">New &amp; featured</a>
          <a href="#">Men</a>
          <a href="#">Women</a>
          <a href="#">Kids</a>
          <a href="#">Sale</a>
        </nav>

        <div class="header-right">
          <div class="top-links">
            <a href="#">Find a store</a>
            <span>|</span>
            <a href="#">Help</a>
            <span>|</span>
            <a href="#">Join us</a>
            <span>|</span>
            <a href="#">Sign in</a>
          </div>

          <div class="search-area">
            <span class="search-icon">⌕</span>
            <span class="search-text">search</span>
          </div>
        </div>
      </div>
    </header>

    <!-- BANNER -->
    <section class="banner">
      <img src="images/banner.jpg" alt="Nike Banner" />
    </section>

    <!-- PRODUCT SECTION -->
    <main class="products-section">
      <div class="products-grid">

        <div class="product-card">
          <img src="images/shoe1.jpg" alt="Shoe 1" />
          <div class="product-title">SHOE</div>
        </div>

        <div class="product-card">
          <img src="images/shoe2.jpg" alt="Shoe 2" />
          <div class="product-title">SHOE</div>
        </div>

        <div class="product-card">
          <img src="images/shoe3.jpg" alt="Shoe 3" />
          <div class="product-title">SHOE</div>
        </div>

        <div class="product-card">
          <img src="images/shoe4.jpg" alt="Shoe 4" />
          <div class="product-title">SHOE</div>
        </div>

      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-left">
          <img src="images/social-group.png" alt="Facebook Twitter Instagram" class="social-group" />
        </div>

        <div class="footer-right-icons">
          <img src="images/phone.png" alt="Phone" class="footer-icon" />
          <img src="images/chat.png" alt="Chat" class="footer-icon" />
        </div>
      </div>
    </footer>

  </div>
</body>
</html>
